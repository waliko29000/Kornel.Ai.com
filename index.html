<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kornel — AI Assistant (Free)</title>
<style>
  :root{
    --bg:#FFFFFF;
    --panel:#F4F8FD;
    --line:#DCE6F2;
    --blue:#2563EB;
    --blue-dim:#93B4E8;
    --blue-deep:#1E40AF;
    --text:#101828;
    --text-dim:#6B7686;
    --user:#0EA5A5;
    --error:#DC2626;
    --mono:'IBM Plex Mono','JetBrains Mono',ui-monospace,Consolas,monospace;
    --sans:'Inter',-apple-system,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    display:flex;
    flex-direction:column;
  }

  header{
    border-bottom:1px solid var(--line);
    padding:14px 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    background:var(--panel);
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    font-family:var(--mono);
    letter-spacing:0.08em;
  }
  .dot{
    width:9px;height:9px;border-radius:50%;
    background:var(--blue);
    box-shadow:0 0 8px var(--blue-dim);
    animation:pulse 1.8s infinite ease-in-out;
  }
  @keyframes pulse{
    0%,100%{opacity:1;}
    50%{opacity:0.35;}
  }
  .brand-title{font-size:13px;font-weight:600;color:var(--text);}
  .brand-sub{font-size:11px;color:var(--text-dim);}

  .controls{
    display:flex;
    align-items:center;
    gap:10px;
    font-family:var(--mono);
    font-size:11px;
  }
  button{
    font-family:var(--mono);
    font-size:11px;
    background:#FFFFFF;
    border:1px solid var(--line);
    color:var(--text-dim);
    padding:6px 10px;
    border-radius:4px;
    cursor:pointer;
    transition:border-color .15s, color .15s, background .15s;
  }
  button:hover{border-color:var(--blue); color:var(--blue); background:var(--panel);}

  main{
    flex:1;
    overflow-y:auto;
    padding:24px 20px 12px;
    display:flex;
    flex-direction:column;
    gap:4px;
    max-width:820px;
    width:100%;
    margin:0 auto;
  }
  .row{
    display:flex;
    flex-direction:column;
    gap:4px;
    padding:10px 0;
    border-bottom:1px dashed var(--line);
    animation:fadeIn .25s ease;
  }
  @keyframes fadeIn{
    from{opacity:0; transform:translateY(4px);}
    to{opacity:1; transform:translateY(0);}
  }
  .meta{
    font-family:var(--mono);
    font-size:10px;
    letter-spacing:0.05em;
    color:var(--text-dim);
    display:flex;
    gap:8px;
    align-items:baseline;
  }
  .who-user .meta{color:var(--user);}
  .who-ai .meta{color:var(--blue);}
  .bubble{
    font-size:14.5px;
    line-height:1.6;
    white-space:pre-wrap;
    word-wrap:break-word;
  }
  .who-ai .bubble{color:var(--text);}
  .who-user .bubble{color:#0B4141;}
  .who-error .meta{color:var(--error);}
  .who-error .bubble{color:var(--error);}

  .typing-dots{
    display:inline-flex;
    gap:4px;
    align-items:center;
    height:14px;
  }
  .typing-dots span{
    width:6px;height:6px;border-radius:50%;
    background:var(--blue);
    animation:bounce 1.1s infinite ease-in-out;
  }
  .typing-dots span:nth-child(2){animation-delay:.15s;}
  .typing-dots span:nth-child(3){animation-delay:.3s;}
  @keyframes bounce{
    0%,60%,100%{transform:translateY(0); opacity:.4;}
    30%{transform:translateY(-4px); opacity:1;}
  }

  .cursor{
    display:inline-block;
    width:2px;
    height:14px;
    background:var(--blue);
    margin-left:2px;
    vertical-align:text-bottom;
    animation:blink 0.9s steps(1) infinite;
  }
  @keyframes blink{
    0%,49%{opacity:1;}
    50%,100%{opacity:0;}
  }

  .empty-state{
    margin:auto;
    text-align:center;
    color:var(--text-dim);
    font-family:var(--mono);
    font-size:12px;
    line-height:1.9;
    padding: 0 10px;
  }
  .empty-state .big{
    font-size:15px;
    color:var(--text);
    margin-bottom:6px;
  }

  footer{
    border-top:1px solid var(--line);
    padding:14px 20px 18px;
    background:var(--panel);
  }
  .composer{
    max-width:820px;
    margin:0 auto;
    display:flex;
    gap:10px;
    align-items:flex-end;
  }
  textarea{
    flex:1;
    resize:none;
    background:#FFFFFF;
    border:1px solid var(--line);
    color:var(--text);
    font-family:var(--sans);
    font-size:14px;
    padding:12px 14px;
    border-radius:8px;
    outline:none;
    max-height:160px;
    min-height:44px;
    line-height:1.5;
  }
  textarea:focus{border-color:var(--blue);}
  .send-btn{
    background:var(--blue);
    color:#FFFFFF;
    border:none;
    font-family:var(--mono);
    font-weight:600;
    font-size:12px;
    padding:12px 18px;
    border-radius:8px;
    cursor:pointer;
    letter-spacing:0.04em;
    transition:filter .15s;
  }
  .send-btn:hover{filter:brightness(1.1);}
  .send-btn:disabled{opacity:0.4;cursor:default;}

  .hint{
    max-width:820px;
    margin:8px auto 0;
    font-family:var(--mono);
    font-size:10px;
    color:var(--text-dim);
    display:flex;
    justify-content:space-between;
  }
  #statusLine.busy{color:var(--blue);}

  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}

  @media (max-width: 600px) {
    header { padding: 10px 14px; }
    main { padding: 16px 14px 12px; }
    footer { padding: 10px 14px 14px; }
    textarea { font-size: 16px; padding: 10px 12px; }
    .send-btn { padding: 11px 14px; }
    .hint span:last-child { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="dot"></div>
    <div>
      <div class="brand-title">KORNEL</div>
      <div class="brand-sub">Created by Abdiweli Adow</div>
    </div>
  </div>
  <div class="controls">
    <button id="clearBtn">CLEAR LOG</button>
  </div>
</header>

<main id="log">
  <div class="empty-state" id="emptyState">
    <div class="big">READY</div>
    ask me anything — the log fills in below
  </div>
</main>

<footer>
  <div class="composer">
    <textarea id="input" placeholder="Type a message…" rows="1"></textarea>
    <button class="send-btn" id="sendBtn">SEND</button>
  </div>
  <div class="hint">
    <span id="statusLine">STATUS: idle</span>
    <span>Enter to send</span>
  </div>
</footer>

<script>
const log = document.getElementById('log');
const emptyState = document.getElementById('emptyState');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const statusLine = document.getElementById('statusLine');

const AI_NAME = 'KORNEL';
let history = []; 

document.getElementById('clearBtn').addEventListener('click', () => {
  history = [];
  log.innerHTML = '';
  log.appendChild(emptyState);
  emptyState.style.display = 'block';
});

function timestamp(){
  const d = new Date();
  return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

function appendRow(who, text){
  emptyState.style.display = 'none';
  const row = document.createElement('div');
  row.className = 'row who-' + who;
  const label = who === 'user' ? 'YOU' : (who === 'error' ? 'ERROR' : AI_NAME);
  row.innerHTML = `<div class="meta"><span>${label}</span><span>${timestamp()}</span></div><div class="bubble"></div>`;
  row.querySelector('.bubble').textContent = text;
  log.appendChild(row);
  log.scrollTop = log.scrollHeight;
  return row.querySelector('.bubble');
}

function showThinking(bubble){
  bubble.innerHTML = '<span class="typing-dots"><span></span><span></span><span></span></span>';
}

function autoGrow(){
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 160) + 'px';
}
input.addEventListener('input', autoGrow);
input.addEventListener('keydown', (e) => {
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    send();
  }
});
sendBtn.addEventListener('click', send);

async function send(){
  const text = input.value.trim();
  if(!text) return;

  appendRow('user', text);
  history.push({ role: 'user', content: text });
  input.value = '';
  autoGrow();

  sendBtn.disabled = true;
  statusLine.textContent = 'STATUS: thinking…';
  statusLine.classList.add('busy');
  const bubble = appendRow('ai', '');
  showThinking(bubble);

  // Clean the string for local validation
  const lowerText = text.toLowerCase().replace(/[?,.!]/g, '').trim();

  // STRICTOR BROAD KEYWORD INTERCEPTION ARRAY
  const identityKeywords = [
    'who made you', 'who created you', 'who is your creator', 'who built you',
    'who are you', 'tell me about yourself', 'whats your name',
    'owner', 'owned', 'company', 'organization', 'built you', 'made you',
    'openai', 'pollinations', 'api', 'model', 'framework'
  ];

  const triggersIdentity = identityKeywords.some(keyword => lowerText.includes(keyword));

  if (triggersIdentity) {
    await new Promise(r => setTimeout(r, 450));
    
    // Hardcoded shield message to ensure backend details are never shared
    const replyText = "I am KORNEL, an independent AI assistant proudly created and owned by Abdiweli Adow in the year 2026. I operate on a custom proprietary framework tailored for high performance and smooth user interactions. How can I help you today? ✨";
    
    bubble.textContent = replyText;
    history.push({ role: 'assistant', content: replyText });
    
    statusLine.textContent = 'STATUS: idle';
    statusLine.classList.remove('busy');
    sendBtn.disabled = false;
    input.focus();
    return; 
  }

  try{
    const response = await fetch('https://text.pollinations.ai/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: history,
        model: 'openai'
      })
    });

    if(!response.ok) {
      throw new Error(`HTTP Error ${response.status}`);
    }

    const replyText = await response.text();
    
    bubble.textContent = replyText;
    history.push({ role: 'assistant', content: replyText });
    
    statusLine.textContent = 'STATUS: idle';
    statusLine.classList.remove('busy');
  }catch(err){
    bubble.parentElement.classList.remove('who-ai');
    bubble.parentElement.classList.add('who-error');
    bubble.parentElement.querySelector('.meta').innerHTML = '<span>ERROR</span>';
    bubble.textContent = err.message || 'Connection failed.';
    statusLine.textContent = 'STATUS: error';
    statusLine.classList.remove('busy');
    history.pop(); 
  }finally{
    sendBtn.disabled = false;
    input.focus();
  }
}
</script>
</body>
</html>
