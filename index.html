<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kornel — AI Assistant (Free)</title>
<style>
  :root{
    --bg:#FFFFFF;
    --panel:#F4F8FD;
    --line:#DCE6F2;
    --blue:#2563EB;
    --blue-dim:#93B4E8;
    --text:#101828;
    --text-dim:#6B7686;
    --user:#0EA5A5;
    --error:#DC2626;
    --mono:'IBM Plex Mono','JetBrains Mono',ui-monospace,Consolas,monospace;
    --sans:'Inter',-apple-system,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:var(--sans); display:flex; flex-direction:column;
  }
  header{
    border-bottom:1px solid var(--line); padding:14px 20px;
    display:flex; align-items:center; justify-content:space-between;
    gap:16px; background:var(--panel);
  }
  .brand{ display:flex; align-items:center; gap:10px; font-family:var(--mono); letter-spacing:0.08em; }
  .dot{
    width:9px; height:9px; border-radius:50%; background:var(--blue);
    box-shadow:0 0 8px var(--blue-dim); animation:pulse 1.8s infinite ease-in-out;
  }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.35;} }
  .brand-title{font-size:13px; font-weight:600;}
  .brand-sub{font-size:11px; color:var(--text-dim);}
  .controls{ font-family:var(--mono); font-size:11px; }
  button{
    font-family:var(--mono); font-size:11px; background:#FFFFFF;
    border:1px solid var(--line); color:var(--text-dim); padding:6px 10px;
    border-radius:4px; cursor:pointer;
  }
  button:hover{border-color:var(--blue); color:var(--blue); background:var(--panel);}
  main{
    flex:1; overflow-y:auto; padding:24px 20px 12px;
    display:flex; flex-direction:column; gap:4px;
    max-width:820px; width:100%; margin:0 auto;
  }
  .row{ display:flex; flex-direction:column; gap:4px; padding:10px 0; border-bottom:1px dashed var(--line); }
  .meta{ font-family:var(--mono); font-size:10px; color:var(--text-dim); display:flex; gap:8px; }
  .who-user .meta{color:var(--user);}
  .who-ai .meta{color:var(--blue);}
  .bubble{ font-size:14.5px; line-height:1.6; white-space:pre-wrap; word-wrap:break-word; }
  .typing-dots{ display:inline-flex; gap:4px; align-items:center; height:14px; }
  .typing-dots span{ width:6px; height:6px; border-radius:50%; background:var(--blue); animation:bounce 1.1s infinite ease-in-out; }
  .typing-dots span:nth-child(2){animation-delay:.15s;}
  .typing-dots span:nth-child(3){animation-delay:.3s;}
  @keyframes bounce{ 0%,60%,100%{transform:translateY(0); opacity:.4;} 30%{transform:translateY(-4px); opacity:1;} }
  .empty-state{ margin:auto; text-align:center; color:var(--text-dim); font-family:var(--mono); font-size:12px; }
  .empty-state .big{ font-size:15px; color:var(--text); margin-bottom:6px; }
  footer{ border-top:1px solid var(--line); padding:14px 20px 18px; background:var(--panel); }
  .composer{ max-width:820px; margin:0 auto; display:flex; gap:10px; align-items:flex-end; }
  textarea{
    flex:1; resize:none; background:#FFFFFF; border:1px solid var(--line);
    color:var(--text); font-family:var(--sans); font-size:14px;
    padding:12px 14px; border-radius:8px; outline:none; max-height:160px; min-height:44px;
  }
  textarea:focus{border-color:var(--blue);}
  .send-btn{
    background:var(--blue); color:#FFFFFF; border:none; font-family:var(--mono);
    font-weight:600; font-size:12px; padding:12px 18px; border-radius:8px; cursor:pointer;
  }
  .send-btn:disabled{opacity:0.4;}
  .hint{ max-width:820px; margin:8px auto 0; font-family:var(--mono); font-size:10px; color:var(--text-dim); display:flex; justify-content:space-between; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="dot"></div>
    <div>
      <div class="brand-title">KORNEL</div>
      <div class="brand-sub">Created by Abdiweli Adow</div>
    </div>
  </div>
  <div class="controls"><button id="clearBtn">CLEAR LOG</button></div>
</header>

<main id="log">
  <div class="empty-state" id="emptyState">
    <div class="big">READY</div>
    ask me anything — the log fills in below
  </div>
</main>

<footer>
  <div class="composer">
    <textarea id="input" placeholder="Type a message…" rows="1"></textarea>
    <button class="send-btn" id="sendBtn">SEND</button>
  </div>
  <div class="hint"><span id="statusLine">STATUS: idle</span><span>Enter to send</span></div>
</footer>

<script>
// GENESIS ID GENERATION (Guarantees tracking even without log-ins)
let mySessionId = localStorage.getItem('kornel_session_token');
if (!mySessionId) {
  mySessionId = 'usr_' + Math.random().toString(36).substring(2, 10);
  localStorage.setItem('kornel_session_token', mySessionId);
}

const log = document.getElementById('log');
const emptyState = document.getElementById('emptyState');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const statusLine = document.getElementById('statusLine');

const BACKEND_URL = 'https://unhonied-belle-openly.ngrok-free.dev/kornel/chat.php';
let history = []; 

document.getElementById('clearBtn').addEventListener('click', () => {
  history = []; log.innerHTML = ''; log.appendChild(emptyState); emptyState.style.display = 'block';
});

function timestamp(){
  return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

function appendRow(who, text){
  emptyState.style.display = 'none';
  const row = document.createElement('div');
  row.className = 'row who-' + who;
  const label = who === 'user' ? 'YOU' : (who === 'error' ? 'ERROR' : 'KORNEL');
  row.innerHTML = `<div class="meta"><span>${label}</span><span>${timestamp()}</span></div><div class="bubble"></div>`;
  row.querySelector('.bubble').textContent = text;
  log.appendChild(row);
  log.scrollTop = log.scrollHeight;
  return row.querySelector('.bubble');
}

function showThinking(bubble){
  bubble.innerHTML = '<span class="typing-dots"><span></span><span></span><span></span></span>';
}

input.addEventListener('keydown', (e) => {
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); send(); }
});
sendBtn.addEventListener('click', send);

async function send(){
  const text = input.value.trim();
  if(!text) return;

  appendRow('user', text);
  history.push({ role: 'user', content: text });
  input.value = '';

  sendBtn.disabled = true;
  statusLine.textContent = 'STATUS: thinking…';
  const bubble = appendRow('ai', '');
  showThinking(bubble);

  try{
    const response = await fetch(BACKEND_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
      body: JSON.stringify({ session_id: mySessionId, messages: history })
    });

    if(!response.ok) throw new Error(`HTTP Error ${response.status}`);
    const replyText = await response.text();
    
    bubble.textContent = replyText;
    history.push({ role: 'assistant', content: replyText });
    statusLine.textContent = 'STATUS: idle';
  }catch(err){
    bubble.parentElement.className = 'row who-error';
    bubble.textContent = err.message || 'Connection failed.';
    statusLine.textContent = 'STATUS: error';
  }finally{
    sendBtn.disabled = false;
    input.focus();
  }
}
</script>
</body>
</html>
